<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamster Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game-container">

    <!-- LEFT SIDE -->
    <div class="left-panel">
        <h2>🐹 Seeds</h2>
        <h1 id="score">0</h1>

        <p>Per Click: <span id="perClick">1</span></p>
        <p>Per Second: <span id="perSecond">0</span></p>
        <p>Boost: <span id="boost">1x</span></p>
    </div>

    <!-- CENTER -->
    <div class="center-panel">

        <h1>Hamster Clicker</h1>

        <img src="hamster.png" id="hamster" alt="Hamster">

        <!-- IMPORTANT: this is where floating numbers + golden seeds appear -->
        <div id="dropZone"></div>

    </div>

    <!-- SHOP -->
    <div class="shop">

        <h2>Upgrades</h2>

        <button id="clickUpgradeBtn">+1 per click<br>Cost: 25</button>
        <button id="autoUpgradeBtn">+1 per second<br>Cost: 50</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>

<button id="megaClickBtn">Faster Seeds<br>Cost: 300</button>
