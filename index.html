<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamster Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game-container">

    <!-- LEFT SIDE -->
    <div class="left-panel">
        <h2>🐹 Seeds</h2>
        <h1 id="score">0</h1>

        <p>Per Click: <span id="perClick">1</span></p>
        <p>Per Second: <span id="perSecond">0</span></p>
        <p>Boost: <span id="boost">1x</span></p>

        <div id="prestigeInfo" style="display:none; margin-top: 20px;">
            <hr>
            <p>⭐ Prestige Level: <span id="prestigeLevel">0</span></p>
            <p>Prestige Bonus: <span id="prestigeBonus">1x</span></p>
        </div>
    </div>

    <!-- CENTER -->
    <div class="center-panel">

        <h1>Hamster Clicker</h1>

        <img src="hamster.png" id="hamster" alt="Hamster" draggable="false">

        <div id="dropZone"></div>

        <button id="prestigeBtn" style="display:none;">
            ⭐ PRESTIGE<br>
            <small>Reset for permanent +0.5x bonus</small>
        </button>

    </div>

    <!-- SHOP -->
    <div class="shop">

        <h2>Upgrades</h2>

        <button id="clickUpgradeBtn">+1 per click<br>Cost: 25</button>
        <button id="autoUpgradeBtn">+1 per second<br>Cost: 50</button>
        <button id="megaUpgradeBtn">+10 per click<br>Cost: 500</button>

    </div>

</div>

<div id="saveNotice">💾 Game Saved!</div>

<script src="script.js"></script>

</body>
</html>
